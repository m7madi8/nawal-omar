<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoga Admin Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <p class="login-kicker">Yoga Website Admin</p>
      <h1>Welcome back</h1>
      <p class="login-subtitle">Sign in to manage yoga classes and retreat requests.</p>

      <form id="loginForm" class="login-form" novalidate>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="nawal" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="nawalll" required>

        <p id="loginError" class="form-error" aria-live="polite"></p>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
